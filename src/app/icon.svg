<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3419e0" />
      <stop offset="100%" stop-color="#836BFF" />
    </linearGradient>
    <linearGradient id="secondaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3419e0" />
      <stop offset="100%" stop-color="#1D0X8A" />
    </linearGradient>
  </defs>

  <!-- Drop Shadow for aesthetics -->
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#3419e0" flood-opacity="0.3"/>
  </filter>

  <g transform="translate(250, 250) rotate(-45) translate(-250, -250)" filter="url(#shadow)">
    <!-- Bottom Left Link -->
    <rect x="120" y="240" width="200" height="120" rx="60" fill="none" stroke="url(#primaryGrad)" stroke-width="45" />
    <!-- Top Right Link -->
    <rect x="180" y="140" width="200" height="120" rx="60" fill="none" stroke="#3419e0" stroke-width="45" />
    <!-- Overlap Trick to make it weave: Redraw part of Bottom Left Link over the top -->
    <path d="M 320 240 A 60 60 0 0 1 320 360" fill="none" stroke="url(#primaryGrad)" stroke-width="45" stroke-linecap="round"/>
  </g>
</svg>
